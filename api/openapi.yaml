        explode: true
        in: query
        name: table
        required: false
        schema:
          $ref: "#/components/schemas/Table"
        style: form
      - description: Season Number
        explode: true
        in: query
        name: season
        required: false
        schema:
          example: 98
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetHistory_200_response"
          description: |
            History Response
            - `History500OBRResponse` is the response that returns when called with value `Stats` for the `table` param.
            - `HistoryCalendarResponse` is the response that returns when called with value `Calendar` for the `table` param.
            - `HistoryGroupCupResponse` is the response that returns when called with value `CupStandings` for the `table` param.
            - `HistoryGroupStandingsResponse` is the response that returns when called with value `Standings` for the `table` param.
            - `HistoryManResultsResponse` is the response that returns when called with value `ManResults` for the `table` param.
            - `HistoryNationsCupResponse` is the response that returns when called with value `NationsKnockoutCup` for the `table` param.
            - `HistoryTeamsCupResponse` is the response that returns when called with value `TeamCupStandings` for the `table` param.
            - `HistoryTeamStandingsResponse` is the response that returns when called with value `TeamsStandings` for the `table` param.
          x-summary: History Response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoggedOut"
          description: History Error
          x-summary: History Error
      security:
      - Bearer: []
      tags:
      - History
      x-accepts:
      - application/json
