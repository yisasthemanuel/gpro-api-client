  /{lang}/backend/api/v2/DriProfile:
    get:
      description: "Retrieve Driver Profile data.\n- When called with no query parameters,\
        \ it'll return the profile of the Token's account driver (if there's a driver\
        \ under contract). \n  - If no driver under contract, property `driName`'s\
        \ value will be `Unknown driver` and `driverNotFoundNote` will be `true`.\n\
        \  - Different schemas are provided for these cases.\n- If called with driver\
        \ id, it'll return the corresponding profile.\n  - If the driver id is invalid,\
        \ it'll default to token's driver or `Unknown driver`, depending on the case\
        \ explained above. \n- If called without a valid token, it'll return a 401\
        \ response.\n"
      operationId: GetDriverProfile
      parameters:
      - description: Code for the language
        explode: false
        in: path
        name: lang
        required: true
        schema:
          $ref: "#/components/schemas/LangOptions"
        style: simple
      - description: id
        explode: true
        in: query
        name: id
        required: false
        schema:
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDriverProfile_200_response"
          description: Driver Profile Data Response
          x-summary: Driver Profile Data Response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoggedOut"
          description: Driver Profile Error
          x-summary: Driver Profile Error
      security:
      - Bearer: []
      tags:
      - Staff
      - Manager Resources
      x-accepts:
      - application/json
