      - Bearer: []
      tags:
      - Race Preparation
      x-accepts:
      - application/json
  /{lang}/backend/api/v2/Testing:
    get:
      description: Retrieve Testing Stints data.
      operationId: GetTesting
      parameters:
      - description: Code for the language
