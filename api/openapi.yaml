        Obtain Historical Statistics
        - If called with no parameters, it defaults to last finished season for `season`, Standings for `table`, and Elite for `group`.
      operationId: GetHistory
      parameters:
      - description: Code for the language
        explode: false
        in: path
        name: lang
        required: true
        schema:
          $ref: "#/components/schemas/LangOptions"
        style: simple
      - description: Group
        explode: true
        in: query
