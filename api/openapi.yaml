                \ 6: Livery ID\n- Index 7: Rain Tyres: 0: No, 1: Yes\n- Index 8: Driver\
                \ Mistake: 0: No, 1: Yes\n- Index 9: Out of the Race: 0: No, 1: Yes\n\
                - Index 10: Position\n- Index 11: Nationality \n- Index 12: Manager's\
                \ Initials\n- Index 13: Trophies\n- Index 14: Tyre Brand\n- Index\
                \ 15: Profile Picture's Link\n- Index 16: Pit Crew ID\n- Index 17:\
                \ Season Position (at race's end)\n- Index 18: Season Points (at race's\
                \ end)\n- Index 19: Season Results (at race's end). Each character\
                \ represents a position 1st to last, while the particular letter represents\
                \ the number of occurences, a=0, b=1 and so on.\n- Index 20: National\
                \ Code\n- Index 21: Old Livery Display Style\n- Index 22: Driver's\
                \ Helmet Link\n- Index 23: Livery Top layer: 0: No, 1: Yes\n\n`Lap\
                \ 1 onwards:`\n- Index 0: Manager's Full Name\n- Index 1: Race Time\
                \ in Miliseconds\n- Index 2: In pits: 0: No, 1: Yes\n- Index 3: Tech\
                \ Problem: 0: No, 1: Yes\n- Index 4: Worn Tyres: 0: No, 1: Yes\n-\
                \ Index 5: Pit time in miliseconds\n- Index 6: Livery ID\n- Index\
                \ 7: Rain Tyres: 0: No, 1: Yes\n- Index 8: Driver Mistake: 0: No,\
                \ 1: Yes\n- Index 9: Out of the Race: 0: No, 1: Yes\n- Index 10: Position\n\
                - Index 11: Driver Mistake Time in miliseconds\n"
