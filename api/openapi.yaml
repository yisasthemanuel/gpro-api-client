          description: Testing Stints Response
          x-summary: Testing Stints Response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoggedOut"
          description: Testing Error
          x-summary: Testing Error
      security:
      - Bearer: []
      tags:
      - Race Preparation
      x-accepts:
      - application/json
  /{lang}/backend/api/v2/Tracks:
    get:
      description: |
        Retrieve Tracks Preview Data.
        - If mode parameter is not used in the request, it returns All Tracks.
      operationId: GetAllTracksPreview
      parameters:
      - description: Code for the language
        explode: false
        in: path
        name: lang
        required: true
        schema:
          $ref: "#/components/schemas/LangOptions"
        style: simple
      - description: Display mode for tracks endpoint
        explode: true
        in: query
        name: mode
        required: false
        schema:
          enum:
          - calendar
          - nextcalendar
          example: calendar
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TracksResponse"
          description: All tracks response
          x-summary: All tracks response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoggedOut"
          description: All tracks Error
          x-summary: All tracks Error
      security:
      - Bearer: []
      tags:
      - Tracks
      x-accepts:
      - application/json
  /{lang}/backend/api/v2/TrackProfile:
    get:
      description: "Retrieve Track Profile Data.\n- When called with no query parameters,\
        \ it'll return the profile for the next race's track. \n  - If it's the `End\
        \ of the Season`, it'll return a 401 response.\n- If called with track id,\
        \ it'll return the corresponding profile.\n  - If the track id is invalid,\
        \ it'll default to next race's track profile. \n    - If it's the `End of\
        \ the Season`, it'll return a 401 response.\n- If called without a valid token,\
        \ it'll return a 401 response.\n"
      operationId: GetTrackProfile
      parameters:
      - description: Code for the language
        explode: false
        in: path
        name: lang
        required: true
        schema:
          $ref: "#/components/schemas/LangOptions"
        style: simple
      - description: id
        explode: true
        in: query
        name: id
        required: true
        schema:
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackProfileResponse"
          description: Track Profile Data Response
          x-summary: Track Profile Data Response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTrackProfile_401_response"
          description: Track Profile Error
          x-summary: Track Profile Error
      security:
      - Bearer: []
      tags:
      - Tracks
      x-accepts:
      - application/json
  /GetMarketFile.asp:
    get:
      description: |
        Legacy GPRO web market files download, updated hourly. Does not require Token authentication.
      operationId: GetMarketFile
      parameters:
      - description: Type of Staff Market
        explode: true
        in: query
        name: market
        required: true
        schema:
          enum:
          - drivers
          - tds
          example: drivers
          type: string
        style: form
      - description: Type of file to download
        explode: true
        in: query
        name: type
        required: true
        schema:
          enum:
          - xml
          - xls
          - csv
          - json
          example: csv
          type: string
        style: form
      responses:
        "200":
          content:
            application/gzip:
              schema:
                format: binary
                type: string
          description: Market File Response
          x-summary: Market File Response
      security: []
      tags:
      - Staff
      x-accepts:
      - application/gzip
