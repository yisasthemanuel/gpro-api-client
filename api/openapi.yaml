openapi: 3.0.3
info:
  description: |
    # Introduction

    GPRO App API is a development meant to serve GPRO Applications Frontend.
    This document curates a selection of endpoints from the GPRO App API to show GPRO managers how to call
    these selected endpoints to optimize their data collection, providing response schemas and extensive examples.
  title: GPRO App Public API
  version: 2.0.0
  x-logo:
    url: https://gpro.net/images/api_gpro_logo.jpg
    altText: GPRO logo
servers:
- url: https://gpro.net
tags:
- description: "Useful information for the ongoing, past or next season"
  name: Season
- description: Everything you need to know about GPRO tracks
  name: Tracks
- description: Find and analyze staff for your team
  name: Staff
- description: Important information related to the group's participants.
  name: Group
- description: Log your preparation for the next race
  name: Race Preparation
- description: Statistics related to last or the ongoing race
  name: Race Statistics
- description: Log of the selected resource or decisions
  name: Manager Resources
- description: Historical Statistics.
  name: History
paths:
  /{lang}/backend/api/v2/Menu:
    get:
      description: Retrieving all GPRO app menu elements.
      operationId: Menu
      parameters:
      - description: Code for the language
        explode: false
        in: path
        name: lang
        required: true
        schema:
          $ref: "#/components/schemas/LangOptions"
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuResponse"
          description: Menu Response
          x-summary: Menu Response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuError"
          description: Menu Error
          x-summary: Menu Error
      security:
      - Bearer: []
      tags:
      - Manager Resources
      x-accepts:
      - application/json
  /{lang}/backend/api/v2/office:
    get:
      description: Retrieving all GPRO app office elements.
      operationId: Office
      parameters:
      - description: Code for the language
        explode: false
        in: path
        name: lang
        required: true
        schema:
          $ref: "#/components/schemas/LangOptions"
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfficeResponse"
          description: Office Response
          x-summary: Office Response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoggedOut"
          description: Office Error
          x-summary: Office Error
      security:
      - Bearer: []
      tags:
      - Manager Resources
      x-accepts:
      - application/json
  /{lang}/backend/api/v2/UpdateCar:
    get:
      description: Retrieving data present in Update Car.
      operationId: GetCar
      parameters:
      - description: Code for the language
        explode: false
        in: path
        name: lang
        required: true
        schema:
          $ref: "#/components/schemas/LangOptions"
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarResponse"
          description: Get Car Response
          x-summary: Get Car Response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoggedOut"
          description: Get Car Error
          x-summary: Get Car Error
      security:
      - Bearer: []
      tags:
      - Manager Resources
      x-accepts:
      - application/json
  /{lang}/backend/api/v2/CCPHistory:
    get:
      description: |
        Obtain the CCPs History
        - If no parameters are used, it defaults to current season.
        - If `season` parameter provided is invalid, it returns an empty data array.
        - If the user is not a supporter, it returns an error message within the 200 response.
      operationId: GetCCPsHistory
      parameters:
      - description: Code for the language
        explode: false
        in: path
        name: lang
        required: true
        schema:
          $ref: "#/components/schemas/LangOptions"
        style: simple
      - description: Season
        explode: true
        in: query
        name: season
        required: false
        schema:
          example: "97"
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCCPsHistory_200_response"
          description: CCPs History Response
          x-summary: CCPs History Response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoggedOut"
          description: CCPs History Error
          x-summary: CCPs History Error
      security:
      - Bearer: []
      tags:
      - Manager Resources
      x-accepts:
      - application/json
  /{lang}/backend/api/v2/Practice:
    get:
      description: Retrieve Practice + Q1 data.
      operationId: GetPracticeQ1
      parameters:
      - description: Code for the language
        explode: false
        in: path
        name: lang
        required: true
        schema:
