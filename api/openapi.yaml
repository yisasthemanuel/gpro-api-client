        trackDesc: "Located within the grounds of a park, this circuit is named after\
          \ Mexico&rsquo;s famous racing brothers Pedro and Ricardo, whose success\
          \ had much to do with attracting the F1 circus here for the first time in\
          \ 1963. The race was won that year by Jim Clark in the Lotus, but there\
          \ was a feeling of sadness too for Ricardo Rodriguez, who had tragically\
          \ lost his life at the circuit the previous year in a non-championship event.\
          \ \r<br>\r<br>The circuit became notorious for its excessively bumpy surface,\
          \ perhaps a result of the earthquakes that frequently hit the area. The\
          \ high altitude (thin air at 7,500 feet) also caused problems for both cars\
          \ and drivers. The final corner (Peralta) was banked and taken at frightening\
          \ speed. Mansell passed Berger there during the 1990 race to finish 2nd\
          \ behind Prost and earn Ferrari a 1-2 finish. \r<br>\r<br>Following serious\
          \ crowd trouble during the 1970 race, Mexico lost its place on the F1 calendar\
          \ and would not return until 1986. The track was altered and uprated for\
          \ its return to F1 and also boasted a new pit complex. The 1992 race, the\
          \ last to be staged at the Mexico City circuit, saw Mansell dominate in\
          \ his active suspension Williams which cushioned the bumps superbly. Financial\
          \ problems were the biggest contributor to the circuit&rsquo;s second F1\
          \ exile, and to date it has not returned."
