            application/json:
              schema:
                $ref: "#/components/schemas/PracticeResponse"
          description: Practice Laps + Q1 Response
          x-summary: Practice Laps + Q1 Response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoggedOut"
          description: PracticeQ1 Error
          x-summary: PracticeQ1 Error
      security:
      - Bearer: []
      tags:
      - Race Preparation
      x-accepts:
      - application/json
  /{lang}/backend/api/v2/Qualify2:
    get:
