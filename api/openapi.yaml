        - `friends`: Grouped by token manager's friends.
        <br><br>
        - `team` and `national` require `team` and `nat` paramater to be specified, respectively, if default option is not the desired one.
      explode: true
      in: query
      name: group
      required: false
      schema:
        $ref: "#/components/schemas/SummaryGroups"
      style: form
    Nationality:
      description: 2 characters code of the manager's nation
      explode: true
      in: query
      name: nat
      required: false
      schema:
        $ref: "#/components/schemas/Nationalities"
      style: form
    Team:
      description: Team ID
      explode: true
      in: query
      name: team
      required: false
      schema:
        example: 291
        type: integer
      style: form
    Mode:
      description: Display mode for tracks endpoint
      explode: true
      in: query
      name: mode
      required: false
      schema:
        enum:
        - calendar
        - nextcalendar
        example: calendar
        type: string
      style: form
    HistorySection:
      description: History Section
      explode: true
      in: query
      name: table
      required: false
      schema:
        $ref: "#/components/schemas/Table"
      style: form
